<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Ley del Gato — Tienda</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tienda.css">
</head>
<body>
  <div class="scene"></div>
  <div class="vignette"></div>
  <div class="scanlines"></div>

  <div class="main">
    <div class="page-header">
      <a href="../PaginaPrincipal/principal.html" class="back-btn">◀ VOLVER</a>
      <div class="logo-area">
        <div class="logo-text">LA LEY DEL GATO</div>
        <div class="logo-sub">MERCADO NEGRO</div>
      </div>
    </div>

    <div class="coins-bar">
      <div class="coins-bar-left">
        <span class="coins-icon">💰</span>
        <div>
          <div class="coins-label">SALDO DISPONIBLE</div>
          <div class="coins-amount" id="coinsAmount">0</div>
        </div>
      </div>
      <div class="coins-bar-right">
        <button class="btn-premium" id="btnPremium">⭐ SUMINISTROS / PREMIUM</button>
      </div>
    </div>

    <div class="shop-tabs">
      <button class="shop-tab active" data-tab="normal">🏪 TIENDA NORMAL</button>
      <button class="shop-tab" data-tab="premium">⭐ TIENDA PREMIUM</button>
    </div>

    <div class="cat-filters">
      <button class="cat-btn active" data-cat="todo">TODO</button>
      <button class="cat-btn" data-cat="SKIN">👗 SKINS</button>
      <button class="cat-btn" data-cat="UTIL">🔧 ÚTILES</button>
      <button class="cat-btn" data-cat="COSMETICO">✨ COSMÉTICOS</button>
    </div>

    <div class="shop-layout">
      <div class="shop-grid" id="shopGrid"></div>

      <div class="buy-panel" id="buyPanel">
        <div class="buy-empty" id="buyEmpty">
          <div class="buy-empty-icon">🏪</div>
          <div class="buy-empty-text">SELECCIONA UN OBJETO<br>PARA COMPRARLO</div>
        </div>
        <div class="buy-content" id="buyContent" style="display:none">
          <div class="buy-item-icon" id="buyIcon"></div>
          <div class="buy-item-name" id="buyName"></div>
          <div class="buy-item-cat"  id="buyCat"></div>
          <div class="buy-item-rar"  id="buyRar"></div>
          <div class="buy-divider"></div>
          <div class="buy-item-desc" id="buyDesc"></div>
          <div class="buy-item-effect" id="buyEffect" style="display:none">
            <div class="buy-effect-title">⚡ EFECTO ESPECIAL</div>
            <div id="buyEffectDesc"></div>
          </div>
          <div class="buy-divider"></div>
          <div class="buy-price-block">
            <div class="buy-price-coins" id="buyPriceCoins" style="display:none">
              <span class="price-icon">💰</span>
              <span class="price-val" id="priceCoins">0</span>
              <span class="price-label">MONEDAS</span>
            </div>
            <div class="buy-price-real" id="buyPriceReal" style="display:none">
              <span class="price-icon">💶</span>
              <span class="price-val" id="priceReal">0.00</span>
              <span class="price-label">€ REAL</span>
            </div>
          </div>
          <div id="msgCompra" class="msg" style="display:none"></div>
          <button class="btn-buy" id="btnBuy">▶ COMPRAR</button>
          <button class="btn-buy-real" id="btnBuyReal" style="display:none">💶 COMPRAR CON DINERO REAL</button>
        </div>
      </div>
    </div>

    <div class="foot">
      <span>LA LEY DEL GATO © 2025</span>
      <span id="shopCount">0 ARTÍCULOS</span>
    </div>
  </div>

  <div class="modal-overlay" id="premiumModal">
    <div class="modal premium-modal" style="max-width: 500px;">
      <div class="premium-icon">💰</div>
      <div class="modal-title">SUMINISTROS DE RED</div>
      <div class="modal-desc">Recarga créditos o adquiere el pase de élite.</div>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0;">
        <button class="cat-btn" onclick="comprarPack('pack_raton')" style="width:100%; font-size:10px;">🐭 200 Cr. - 1,99€</button>
        <button class="cat-btn" onclick="comprarPack('pack_agente')" style="width:100%; font-size:10px;">🕵️ 550 Cr. - 4,99€</button>
        <button class="cat-btn" onclick="comprarPack('pack_elite')" style="width:100%; font-size:10px;">🕶️ 1200 Cr. - 9,99€</button>
        <button class="cat-btn" onclick="comprarPack('pack_leyenda')" style="width:100%; font-size:10px;">👑 2500 Cr. - 19,99€</button>
      </div>

      <div class="buy-divider"></div>
      <div style="margin: 15px 0; text-align: center;">
          <div style="color: var(--gold); font-size: 12px; margin-bottom: 10px;">⭐ PASE PREMIUM</div>
          <button class="btn-buy" id="premiumBuyBtn" style="width: 100%;">ADQUIRIR POR 9,99€</button>
      </div>

      <button class="btn-modal-cancel" id="premiumClose" style="width:100%">CERRAR</button>
    </div>
  </div>

  <script src="tienda.js"></script>
</body>
</html>
