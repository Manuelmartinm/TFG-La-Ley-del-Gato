<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>La Ley del Gato — Procesando</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    body { background: #080601; color: #f0d060; font-family: 'VT323', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { border: 2px solid #c8a030; padding: 40px; text-align: center; background: rgba(20,15,5,0.9); max-width: 400px; }
    .icon { font-size: 50px; margin-bottom: 20px; }
    .btn { background: #c8a030; color: black; border: none; padding: 10px 20px; cursor: pointer; margin-top: 20px; font-family: inherit; font-weight: bold; }
    .dots::after { content: ''; animation: dots 1.5s infinite; }
    @keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }
  </style>
</head>
<body>
  <div class="card">
    <div id="icon" class="icon">⏳</div>
    <h1 id="title">VERIFICANDO<span class="dots"></span></h1>
    <p id="msg">Sincronizando con los servidores de la resistencia...</p>
    <div id="monedasBox" style="display:none; font-size: 30px; color: gold; margin: 20px 0;"></div>
    <button id="btnVolver" style="display:none;" onclick="location.href='../Tienda/tienda.html'">▶ VOLVER A LA TIENDA</button>
  </div>
  <script src="pago.js"></script>
</body>
</html>
